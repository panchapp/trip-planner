<div
  class="relative flex min-h-screen w-full items-center justify-center overflow-hidden bg-gradient-to-br from-slate-950 via-[#0c1525] to-[#0a1628] p-4 sm:p-6"
>
  <!-- Cool ambient glows — complementary to warm orange logo -->
  <div class="pointer-events-none absolute inset-0 z-0">
    <div
      class="absolute -top-[15%] -left-[15%] h-[65%] w-[65%] rounded-full bg-blue-600/12 blur-[110px]"
    ></div>
    <div
      class="absolute -right-[12%] bottom-[-5%] h-[55%] w-[55%] rounded-full bg-cyan-500/10 blur-[100px]"
    ></div>
    <div
      class="absolute top-[35%] left-[15%] h-[35%] w-[35%] rounded-full bg-indigo-500/8 blur-[90px]"
    ></div>
    <div
      class="absolute inset-0 bg-[url('https://grainy-gradients.vercel.app/noise.svg')] opacity-[0.12] brightness-50 contrast-125"
    ></div>
  </div>

  <div class="relative z-10 w-full max-w-[420px]">
    <div
      class="overflow-hidden rounded-3xl border border-white/10 bg-white/[0.04] shadow-[0_24px_80px_-20px_rgba(0,0,0,0.55)] ring-1 ring-white/10 backdrop-blur-2xl"
    >
      <div class="px-8 pt-10 pb-6 text-center sm:px-10 sm:pt-12">
        <img
          src="/icon.svg"
          alt="Trip Planner"
          class="mx-auto mb-8 block h-20 w-20 object-contain sm:h-24 sm:w-24"
          width="96"
          height="96"
        />

        <h1 class="text-3xl font-black tracking-tight text-white sm:text-4xl">
          Trip
          <span
            class="bg-gradient-to-r from-amber-400 via-orange-400 to-amber-500 bg-clip-text text-transparent"
            >Planner</span
          >
        </h1>
        <p class="mx-auto mt-4 max-w-sm text-[15px] leading-relaxed text-slate-300/90">
          Sign in to plan trips with the smartest feline explorer.
        </p>
      </div>

      <div class="border-t border-white/5 bg-white/[0.02] px-8 py-8 sm:px-10">
        <button
          type="button"
          (click)="signInWithGoogle()"
          class="group relative flex w-full cursor-pointer items-center justify-center gap-3 rounded-2xl border border-white/12 bg-white px-5 py-4 text-base font-semibold text-slate-800 shadow-lg ring-1 shadow-slate-950/20 ring-white/20 transition hover:bg-slate-50 hover:shadow-xl focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:ring-offset-2 focus-visible:ring-offset-[#0c1525] focus-visible:outline-none active:scale-[0.99]"
        >
          <svg class="h-5 w-5 shrink-0" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              fill="#4285F4"
            />
            <path
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              fill="#34A853"
            />
            <path
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
              fill="#FBBC05"
            />
            <path
              d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              fill="#EA4335"
            />
          </svg>
          <span>Continue with Google</span>
        </button>
      </div>
    </div>
  </div>
</div>
