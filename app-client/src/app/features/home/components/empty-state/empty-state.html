<div
  class="relative overflow-hidden rounded-3xl border border-dashed border-white/20 bg-white/[0.04] px-8 py-24 text-center shadow-2xl backdrop-blur-2xl"
>
  <div
    class="mx-auto flex h-28 w-28 items-center justify-center rounded-[2rem] bg-orange-500/10 text-6xl text-orange-400 shadow-inner"
    aria-hidden="true"
  >
    ✈
  </div>
  <div class="mt-10 space-y-4">
    <h2 class="text-3xl font-bold tracking-tight text-white">No adventures yet</h2>

  <button
    type="button"
    (click)="onStart()"

    <svg

      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"

        stroke-linejoin="round"
        stroke-width="3"
        d="M13 7l5 5m0 0l-5 5m5-5H6"
