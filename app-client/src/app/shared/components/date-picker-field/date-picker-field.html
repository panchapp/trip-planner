<div class="relative w-full min-w-[11rem]">
  <button
    cdkOverlayOrigin
    #triggerOrigin="cdkOverlayOrigin"
    type="button"
    [id]="inputId()"
    class="flex w-full min-w-[11rem] cursor-pointer items-center justify-between gap-2 rounded-xl border border-orange-500/25 bg-white/[0.06] px-3 py-2.5 text-left text-sm font-semibold text-orange-50 focus:border-orange-500/60 focus:ring-2 focus:ring-orange-500/35 focus:outline-none"
    [attr.aria-expanded]="open()"
    [attr.aria-haspopup]="true"
    (click)="toggle($event)"
  >
    <span [class.text-slate-500]="!value()" [class.text-orange-50]="value()">
      {{ displayText() || 'Select date' }}
    </span>
    <span class="shrink-0 text-orange-400" aria-hidden="true">
      <svg lucideCalendar class="h-5 w-5" [size]="20" />
    </span>
  </button>

  <ng-template
    cdkConnectedOverlay
    [cdkConnectedOverlayOrigin]="triggerOrigin"
    [cdkConnectedOverlayOpen]="open()"
    [cdkConnectedOverlayPositions]="overlayPositions"
    [cdkConnectedOverlayScrollStrategy]="scrollStrategy"
    [cdkConnectedOverlayViewportMargin]="8"
    [cdkConnectedOverlayWidth]="panelWidthPx"
    (overlayOutsideClick)="closeOverlay()"
  >
    <div
      class="max-w-[calc(100vw-1rem)] overflow-hidden rounded-xl border border-orange-500/25 bg-slate-950/98 shadow-2xl ring-1 shadow-black/60 ring-orange-500/15 backdrop-blur-xl"
      role="dialog"
      aria-modal="true"
      [attr.aria-label]="monthTitle()"
      (click)="$event.stopPropagation()"
    >
      <div class="border-b border-white/10 bg-slate-950/80 px-5 py-2">
        <div class="mb-2 flex items-center justify-between gap-3">
          <button
            type="button"
            class="cursor-pointer rounded-lg p-1.5 text-slate-400 transition hover:bg-white/10 hover:text-orange-200"
            (click)="prevMonth()"
            aria-label="Previous month"
          >
            <svg lucideChevronLeft class="h-5 w-5" [size]="20" />
          </button>
          <span class="text-sm font-semibold tracking-tight text-orange-50">{{
            monthTitle()
          }}</span>
          <button
            type="button"
            class="cursor-pointer rounded-lg p-1.5 text-slate-400 transition hover:bg-white/10 hover:text-orange-200"
            (click)="nextMonth()"
            aria-label="Next month"
          >
            <svg lucideChevronRight class="h-5 w-5" [size]="20" />
          </button>
        </div>

        <div
          class="mb-1.5 grid grid-cols-7 gap-x-4 gap-y-0 py-0.5 text-center text-[11px] leading-tight font-bold tracking-wider text-slate-500 uppercase"
        >
          <span>Su</span>
          <span>Mo</span>
          <span>Tu</span>
          <span>We</span>
          <span>Th</span>
          <span>Fr</span>
          <span>Sa</span>
        </div>

        @for (row of calendarRows(); track $index) {
          <div class="mb-0.5 grid grid-cols-7 gap-x-4 gap-y-0 last:mb-0">
            @for (cell of row; track cell.dateStr) {
              <button
                type="button"
                [disabled]="cell.disabled"
                class="flex min-h-8 w-full min-w-0 items-center justify-center rounded-lg px-0.5 py-0 text-sm font-medium transition duration-150 focus:outline-none focus-visible:ring-2 focus-visible:ring-orange-400/70 disabled:cursor-not-allowed"
                [ngClass]="{
                  'cursor-not-allowed bg-slate-900/70 !text-slate-400 shadow-none': cell.disabled,
                  'cursor-pointer bg-gradient-to-r from-orange-500 to-amber-500 font-bold text-slate-950 shadow-md shadow-orange-500/25 hover:shadow-lg hover:shadow-orange-500/35 hover:brightness-110 active:brightness-95':
                    !cell.disabled && cell.isSelected,
                  'cursor-pointer text-orange-100 ring-1 ring-orange-400/55 hover:bg-white/10 active:bg-white/5':
                    !cell.disabled && !cell.isSelected && cell.isToday,
                  'cursor-pointer text-slate-600 hover:bg-white/10 active:bg-white/5':
                    !cell.disabled && !cell.isSelected && !cell.isToday && cell.muted,
                  'cursor-pointer text-slate-200 hover:bg-white/10 active:bg-white/5':
                    !cell.disabled && !cell.isSelected && !cell.isToday && !cell.muted,
                }"
                [attr.aria-disabled]="cell.disabled"
                [attr.title]="cell.disabled ? 'Outside allowed date range' : null"
                (click)="selectDay(cell)"
              >
                {{ cell.label }}
              </button>
            }
          </div>
        }
      </div>

      <div
        class="flex items-center justify-between gap-4 border-t border-white/10 bg-slate-950/90 px-5 py-2.5"
      >
        <button
          type="button"
          class="cursor-pointer rounded-md px-2 py-1 text-sm font-medium text-slate-500 transition hover:bg-white/5 hover:text-orange-200"
          (click)="clear()"
        >
          Clear
        </button>
        <button
          type="button"
          class="cursor-pointer rounded-md px-2 py-1 text-sm font-semibold text-orange-400 transition hover:bg-orange-500/10 hover:text-amber-300 disabled:cursor-not-allowed disabled:text-slate-600 disabled:opacity-50 disabled:hover:bg-transparent"
          [disabled]="todayDisabled()"
          [attr.title]="todayDisabled() ? 'Today is outside the allowed date range' : null"
          (click)="pickToday()"
        >
          Today
        </button>
      </div>
    </div>
  </ng-template>
</div>
